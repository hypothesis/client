version: 2
updates:
  - package-ecosystem: pip
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      time: '10:00'
    open-pull-requests-limit: 20
    groups:
      babel:
        patterns:
          - '@babel/*'
      eslint:
        patterns:
          - 'eslint*'
          - 'typescript-eslint'
      rollup:
        patterns:
          - 'rollup'
          - '@rollup/*'
      sentry:
        patterns:
          - '@sentry/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      typescript-types:
        patterns:
          - '@types/*'
      redux:
        patterns:
          - 'redux'
          - 'redux-thunk'
          - 'reselect'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
